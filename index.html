<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Golf Cart Shop OS — Lakeside Golf Carts</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: {
            50:'#ecfdf5',100:'#d1fae5',200:'#a7f3d0',300:'#6ee7b7',
            400:'#34d399',500:'#10b981',600:'#059669',700:'#047857',
            800:'#065f46',900:'#064e3b'
          }
        }
      }
    }
  }
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.0.0/dist/driver.css" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

<div id="app" class="min-h-screen flex">
  <!-- Sidebar -->
  <aside id="sidebar" class="w-64 shrink-0 bg-white border-r border-slate-200 hidden md:flex flex-col">
    <div class="h-16 flex items-center gap-2 px-5 border-b border-slate-200">
      <div class="w-9 h-9 rounded-lg bg-brand-600 text-white grid place-items-center font-bold">G</div>
      <div>
        <div class="text-sm font-semibold leading-tight">Golf Cart Shop OS</div>
        <div class="text-[11px] text-slate-500">Lakeside Golf Carts</div>
      </div>
    </div>
    <nav id="nav" class="flex-1 overflow-y-auto py-3 text-sm"></nav>
    <div class="p-3 border-t border-slate-200 text-[11px] text-slate-500">
      v1.0 · Demo build
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col min-w-0">
    <!-- Topbar -->
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 md:px-6 gap-3">
      <div class="flex items-center gap-3">
        <button id="menu-btn" class="md:hidden p-2 rounded hover:bg-slate-100"><i data-lucide="menu" class="w-5 h-5"></i></button>
        <div>
          <div class="text-sm font-semibold">Lakeside Golf Carts</div>
          <div class="text-[11px] text-slate-500">Onalaska, TX · Main Location</div>
        </div>
      </div>
      <div class="flex-1 max-w-md hidden md:block">
        <div class="relative">
          <i data-lucide="search" class="w-4 h-4 absolute left-3 top-2.5 text-slate-400"></i>
          <input placeholder="Search customers, carts, work orders…" class="w-full pl-9 pr-3 py-2 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-300" />
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button id="replay-btn" class="hidden md:inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium bg-brand-50 text-brand-700 hover:bg-brand-100">
          <i data-lucide="play-circle" class="w-4 h-4"></i> Replay the Day
        </button>
        <div class="relative">
          <button id="role-btn" class="flex items-center gap-2 px-2.5 py-1.5 rounded-lg hover:bg-slate-100">
            <div id="role-avatar" class="w-8 h-8 rounded-full bg-brand-600 text-white text-xs grid place-items-center font-semibold">JT</div>
            <div class="hidden md:block text-left">
              <div id="role-name" class="text-xs font-semibold leading-tight">Jess Tully</div>
              <div id="role-title" class="text-[11px] text-slate-500">Owner</div>
            </div>
            <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400"></i>
          </button>
          <div id="role-menu" class="hidden absolute right-0 mt-2 w-56 bg-white border border-slate-200 rounded-lg shadow-lg z-30 overflow-hidden">
            <div class="px-3 py-2 text-[10px] uppercase tracking-wide text-slate-500 border-b">Switch role</div>
          </div>
        </div>
      </div>
    </header>

    <!-- Screen mount -->
    <main id="screen" class="flex-1 overflow-y-auto p-4 md:p-6"></main>
  </div>
</div>

<!-- Toast container -->
<div id="toast-wrap" class="fixed bottom-5 right-5 z-50 space-y-2"></div>

<!-- Modal mount -->
<div id="modal-mount"></div>

<!-- Welcome modal -->
<div id="welcome" class="hidden fixed inset-0 z-40 bg-slate-900/50 grid place-items-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full overflow-hidden">
    <div class="h-32 bg-gradient-to-br from-brand-500 to-brand-700 relative">
      <div class="absolute inset-0 grid place-items-center text-white">
        <i data-lucide="sun" class="w-10 h-10 opacity-90"></i>
      </div>
    </div>
    <div class="p-6">
      <h2 class="text-xl font-bold mb-1">Meet Lakeside Golf Carts</h2>
      <p class="text-sm text-slate-600 mb-5">Walk through a typical day on Golf Cart Shop OS — open to close, every job, every person on your team. <span class="text-slate-500">(About 90 seconds.)</span></p>
      <div class="flex gap-2 justify-end">
        <button id="welcome-skip" class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-lg">Skip</button>
        <button id="welcome-start" class="px-4 py-2 text-sm bg-brand-600 text-white font-medium rounded-lg hover:bg-brand-700">Start the day →</button>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/driver.js@1.0.0/dist/driver.js.iife.js"></script>
<script src="js/mockData.js"></script>
<script src="js/screens.js"></script>
<script src="js/tour.js"></script>
<script src="js/app.js"></script>
</body>
</html>
